<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submitted Files</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        background:
          linear-gradient(rgba(10, 35, 80, 0.65), rgba(10, 35, 80, 0.65)),
          url("school.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        padding: 32px 20px;
        color: #172033;
      }

      .container {
        width: 100%;
        max-width: 1100px;
        margin: 0 auto;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
      }

      .title h1 {
        color: white;
        font-size: 30px;
        margin-bottom: 6px;
      }

      .title p {
        color: #e8edf7;
        font-size: 15px;
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 18px;
        border-radius: 12px;
        background: white;
        color: #123d7a;
        text-decoration: none;
        font-weight: bold;
      }

      .panel {
        background: white;
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.18);
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 15px 12px;
        border-bottom: 1px solid #edf0f5;
        text-align: left;
        font-size: 14px;
        vertical-align: top;
      }

      th {
        background: #eef4ff;
        color: #123d7a;
      }

      .file-name {
        color: #667085;
        display: block;
        font-size: 13px;
        margin-top: 4px;
      }

      .status {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: bold;
      }

      .approved {
        background: #d8eadf;
        color: #2f4f1f;
      }

      .pending {
        background: #fff4cf;
        color: #946200;
      }

      .rejected {
        background: #ffe2e2;
        color: #a71919;
      }

      .comment {
        color: #555;
        line-height: 1.5;
        min-width: 220px;
      }

      .empty-state {
        text-align: center;
        padding: 42px 20px;
        color: #667085;
      }

      .empty-state i {
        display: block;
        color: #123d7a;
        font-size: 42px;
        margin-bottom: 14px;
      }

      @media (max-width: 720px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        th,
        td {
          min-width: 145px;
        }
      }
    </style>
  </head>

  <body>
    <main class="container">
      <div class="topbar">
        <div class="title">
          <h1>Submitted Files</h1>
          <p>View your submitted documents, approval status and supervisor comments.</p>
        </div>

        <a href="studentdashboard.html" class="back-btn">
          <i class="fa-solid fa-arrow-left"></i>
          Dashboard
        </a>
      </div>

      <section class="panel">
        <table id="filesTable">
          <thead>
            <tr>
              <th>Document</th>
              <th>Date Submitted</th>
              <th>Status</th>
              <th>Project Supervisor Comment</th>
            </tr>
          </thead>
          <tbody id="submittedRows"></tbody>
        </table>

        <div class="empty-state" id="emptyState">
          <i class="fa-solid fa-folder-open"></i>
          <p>No submitted documents yet.</p>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
    <script>
      const currentUser = SIWES.requireUser("student");

      if (currentUser) {
        const rows = document.getElementById("submittedRows");
        const emptyState = document.getElementById("emptyState");
        const filesTable = document.getElementById("filesTable");
        const submissions = SIWES.getStudentSubmissions(currentUser);

        if (!submissions.length) {
          filesTable.style.display = "none";
          emptyState.style.display = "block";
        } else {
          filesTable.style.display = "table";
          emptyState.style.display = "none";
          rows.innerHTML = submissions
            .map(
              (item) => `
                <tr>
                  <td>
                    <strong>${item.projectTitle}</strong>
                    <span class="file-name">${item.fileName}</span>
                  </td>
                  <td>${SIWES.formatDate(item.submittedAt)}</td>
                  <td><span class="status ${item.status}">${item.status}</span></td>
                  <td class="comment">${
                    item.comment || "No supervisor comment yet."
                  }</td>
                </tr>
              `,
            )
            .join("");
        }
      }
    </script>
  </body>
</html>
